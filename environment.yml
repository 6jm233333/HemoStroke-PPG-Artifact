name: hemostroke-ppg
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  - numpy=2.1.2
  - pandas=2.3.3
  - scipy=1.16.3
  - matplotlib=3.10.8
  - seaborn=0.13.2
  - tqdm=4.66.5
  - scikit-learn=1.7.2
  - openpyxl=3.1.5
  - pyyaml=6.0.3

  - pytorch=2.6.0
  - torchvision=0.21.0
  - torchaudio=2.6.0
  - pytorch-cuda=12.4

  - pip:
      - wfdb==4.3.1
      - dotmap==1.3.30
      - pyPPG==1.0.73
      - shap==0.50.0
      - pytest==8.4.2
