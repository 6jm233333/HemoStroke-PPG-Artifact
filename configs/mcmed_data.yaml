dataset_name: mcmed

paths:
  raw_root: data/raw/mcmed
  interim_root: data/interim/mcmed
  processed_root: data/processed/mcmed

  visits_csv: data/raw/mcmed/visits.csv
  rads_csv: data/raw/mcmed/rads.csv
  waveform_summary_csv: data/raw/mcmed/waveform_summary.csv
  waveforms_root: data/raw/mcmed/waveforms

  split_random_train_csv: data/raw/mcmed/split_random_train.csv
  split_random_val_csv: data/raw/mcmed/split_random_val.csv
  split_random_test_csv: data/raw/mcmed/split_random_test.csv

  split_chrono_train_csv: data/raw/mcmed/split_chrono_train.csv
  split_chrono_val_csv: data/raw/mcmed/split_chrono_val.csv
  split_chrono_test_csv: data/raw/mcmed/split_chrono_test.csv

  llm_input_csv: data/interim/mcmed/llm_input_radiology.csv
  reviewed_anchor_csv: data/interim/mcmed/reviewed_anchor_candidates.csv
  pleth_segment_manifest_csv: data/interim/mcmed/pleth_waveform_segments.csv
  stroke_index_csv: data/interim/mcmed/stroke_index_raw.csv
  filtered_index_csv: data/processed/mcmed/stroke_index_filtered.csv

  feature_dir: data/processed/mcmed/features_raw
  cleaned_feature_dir: data/processed/mcmed/features_cleaned
  selected_feature_dir: data/processed/mcmed/features_selected

id_columns:
  patient_id: MRN
  visit_id: CSN

time_columns:
  waveform_start: WAVE_START
  waveform_end: WAVE_END
  extracted_stroke_time: Extracted_Timestamp
  roomed_time: Roomed_time
  departure_time: Departure_time

waveform_columns:
  waveform_path: WAVE_PATH
  waveform_type: Wave_Type

anchor_generation:
  radiology_row_id: Row_ID
  radiology_text_fields:
    - Study
    - Impression
  canonical_note_timestamp: Result_time
  retained_source_timestamp: Order_time
  reviewed_anchor_time: Extracted_Timestamp
  require_unique_reviewed_anchor_per_visit: true
  pleth_value: Pleth

segment_filter:
  warning_hours: 6
  keep_crossing: true
  keep_prewarning: true
  deduplicate_by:
    - WAVE_PATH
    - Extracted_Timestamp

split:
  use_official_split: false
  split_type: random
  patient_level_grouping: true

quality_control:
  require_columns:
    - Extracted_Timestamp
    - WAVE_START
    - WAVE_END
    - WAVE_PATH

time_processing:
  utc_to_naive: true 
  format: "%Y-%m-%d %H:%M:%S"
