project:
  name: hemostroke_ppg
  seed: 42

experiments:
  run_all_horizons: true

  horizons:
    - name: h4
      hours: 4
      minutes: 240
      train_data_dir:
        mimic: data/processed/mimic/horizon_sets/240min
        mcmed: data/processed/mcmed/horizon_sets/240min
      output_dir: outputs/main/h4_240min

    - name: h5
      hours: 5
      minutes: 300
      train_data_dir:
        mimic: data/processed/mimic/horizon_sets/300min
        mcmed: data/processed/mcmed/horizon_sets/300min
      output_dir: outputs/main/h5_300min

    - name: h6
      hours: 6
      minutes: 360
      train_data_dir:
        mimic: data/processed/mimic/horizon_sets/360min
        mcmed: data/processed/mcmed/horizon_sets/360min
      output_dir: outputs/main/h6_360min

data:
  internal_dataset: mimic
  external_dataset: mcmed

  feature_array_name: data
  label_array_name: label
  pid_array_name: pid

  labels_to_use:
    negative: 0
    positive: 1

  drop_ignore_label: true
  ignore_label_value: -1

split:
  strategy: group_kfold
  n_splits: 5
  shuffle: true
  random_state: 42

  group_unit: patient
  keep_same_pid_across_horizons: true
  keep_same_pid_across_folds: true

sampling:
  enabled: true
  mode: weighted_sampler   # weighted_sampler / undersample / none
  target_pos_neg_ratio: 1.0
  apply_to_train_only: true

feature_engineering:
  # Frozen from the MIMIC development pipeline and reused unchanged on MC-MED.
  baseline_method: mean
  baseline_fraction: 0.10
  min_baseline_points: 5

model:
  name: resnet1d
  input_channels: 17
  num_classes: 2
  hidden_dim: 64
  dropout: 0.2

training:
  batch_size: 128
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 15
  optimizer: adam
  scheduler: reduce_on_plateau
  monitor_metric: macro_f1
  positive_class_weight: 3.0
  save_best_only: true

evaluation:
  # Frozen operating point selected on MIMIC validation only.
  threshold: 0.7910
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - auc
    - auprc

  save_fold_metrics_csv: true
  save_mean_std_csv: true
  save_predictions_csv: true
  save_confusion_matrix: true

external_validation:
  enabled: true
  use_fold_trained_models: true
  retrain_on_full_internal: false
  evaluate_each_horizon_independently: true
  save_external_predictions: true

comparison:
  compare_horizons: true
  primary_horizon_order:
    - h4
    - h5
    - h6
  primary_metric: f1
  save_horizon_summary_table: true
  save_horizon_summary_plot: true

subgroup_analysis:
  enabled: true
  subgroup_columns:
    - Gender
    - Age_Group
    - Race
  min_samples_per_group: 20
  save_per_horizon_subgroup_results: true

explainability:
  shap_enabled: true
  num_background_samples: 200
  num_explain_samples: 500
  save_global_plots: true
  save_local_plots: true
